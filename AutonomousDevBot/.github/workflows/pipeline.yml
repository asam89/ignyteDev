name: Autonomous Dev Pipeline

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  NODE_ENV: development

jobs:
  # ─────────────────────────────────────────────
  # Lint & Test — runs on every push and PR
  # ─────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt yet"
          pip install flake8 pytest

      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Test
        run: pytest tests/ -v || echo "No tests yet"

  # ─────────────────────────────────────────────
  # Deploy to Development — auto on dev/** branches
  # ─────────────────────────────────────────────
  deploy-dev:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/heads/dev/')
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Dev
        run: |
          echo "🚀 Deploying to DEVELOPMENT environment"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Add your dev deployment steps here
          # e.g., SSH to OCI dev instance, docker pull, restart container

  # ─────────────────────────────────────────────
  # Deploy to Production — only on main, requires approval
  # ─────────────────────────────────────────────
  deploy-prod:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to PRODUCTION environment"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Add your prod deployment steps here
          # e.g., SSH to OCI prod instance, docker pull, restart container
