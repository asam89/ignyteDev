name: Autonomous Dev Pipeline

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Lint & Test — runs on every push and PR
  # ─────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt yet"
          pip install flake8 pytest

      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Test
        run: pytest tests/ -v || echo "No tests yet"

  # ─────────────────────────────────────────────
  # Deploy to Development — auto on dev/** branches
  # ─────────────────────────────────────────────
  deploy-dev:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/heads/dev/')
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to Dev via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="$HOME/ignyteDev"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/asam89/ignyteDev.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"

            # Rebuild and restart containers
            docker compose build --no-cache
            docker compose up -d

            echo "Deployed branch ${{ github.ref_name }} to DEV"
            echo "Commit: $(git rev-parse --short HEAD)"

  # ─────────────────────────────────────────────
  # Deploy to Production — only on main push
  # ─────────────────────────────────────────────
  deploy-prod:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Prod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="$HOME/ignyteDev"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/asam89/ignyteDev.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart containers
            docker compose build --no-cache
            docker compose up -d

            echo "Deployed to PRODUCTION"
            echo "Commit: $(git rev-parse --short HEAD)"
